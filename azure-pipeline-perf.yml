# azure-pipeline-perf.yml
# ─────────────────────────────────────────────────────────────────────────
# Performance test stage for Azure DevOps.
# Triggers an LRE run, waits for completion, fetches and parses the
# results DB (SQLite on CE 2023+ / MDB on older), then ingests into
# InfluxDB + Postgres and optionally gates the pipeline on SLA.
#
# BEFORE USING:
#   1. Verify your LRE results DB format:
#      - Download a completed run's Results_<ID>.zip from LRE manually
#      - Open the .db file in SQLiteStudio
#      - Run: SELECT name FROM sqlite_master WHERE type='table';
#      - Check Event_meter has per-sample rows: SELECT COUNT(*) FROM Event_meter;
#      If Event_meter is absent or empty, see README.md troubleshooting section.
#
#   2. Set the following pipeline variables/secrets in Azure DevOps:
#      LRE_HOST, LRE_USER, LRE_PASSWORD, LRE_DOMAIN, LRE_PROJECT
#      INFLUX_URL, INFLUX_TOKEN, INFLUX_ORG, INFLUX_BUCKET
#      POSTGRES_HOST, POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
# ─────────────────────────────────────────────────────────────────────────

parameters:
  - name: testDefId
    displayName: Postgres test_definition_id (UUID)
    type: string
  - name: lreScenarioId
    displayName: LRE Scenario ID
    type: string
  - name: vusers
    displayName: Virtual user count
    type: number
    default: 100
  - name: failOnSla
    displayName: Fail pipeline on SLA breach
    type: boolean
    default: true

stages:
  - stage: PerformanceTest
    displayName: Performance test
    jobs:
      - job: RunAndIngest
        displayName: Run LRE + ingest results
        timeoutInMinutes: 180
        pool:
          vmImage: ubuntu-latest

        steps:

          # ── Python setup ─────────────────────────────────────────────────
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.11"

          - script: |
              pip install requests numpy python-dotenv \
                          influxdb-client psycopg2-binary
              # Uncomment if your LRE produces .mdb (pre-2023 versions):
              # sudo apt-get install -y mdbtools
            displayName: Install dependencies

          # ── Trigger LRE run ───────────────────────────────────────────────
          - task: PythonScript@0
            name: TriggerLRE
            displayName: Trigger LRE scenario
            inputs:
              scriptSource: inline
              script: |
                import requests, os, sys

                LRE_HOST     = os.environ["LRE_HOST"]
                LRE_USER     = os.environ["LRE_USER"]
                LRE_PASSWORD = os.environ["LRE_PASSWORD"]
                LRE_DOMAIN   = os.environ.get("LRE_DOMAIN", "DEFAULT")
                LRE_PROJECT  = os.environ["LRE_PROJECT"]
                SCENARIO_ID  = "${{ parameters.lreScenarioId }}"

                session = requests.Session()

                # Authenticate — /LoadTest path is case-sensitive in CE 25.1+
                auth = session.post(
                    f"{LRE_HOST}/LoadTest/rest/server/login",
                    data={"login": LRE_USER, "password": LRE_PASSWORD},
                    headers={"Content-Type": "application/x-www-form-urlencoded"},
                    verify=False,
                )
                if auth.status_code not in (200, 201):
                    print(f"Auth failed: {auth.status_code} {auth.text[:200]}")
                    sys.exit(1)

                resp = session.post(
                    f"{LRE_HOST}/LoadTest/rest/domains/{LRE_DOMAIN}"
                    f"/projects/{LRE_PROJECT}/Runs",
                    json={"TestID": SCENARIO_ID, "NumberOfVusers": ${{ parameters.vusers }}},
                    verify=False,
                )
                resp.raise_for_status()
                run_id = resp.json().get("ID") or resp.json().get("id")
                if not run_id:
                    print(f"No run ID in response: {resp.text[:300]}")
                    sys.exit(1)

                print(f"LRE Run ID: {run_id}")
                print(f"##vso[task.setvariable variable=LRE_RUN_ID;isOutput=true]{run_id}")
            env:
              LRE_HOST:     $(LRE_HOST)
              LRE_USER:     $(LRE_USER)
              LRE_PASSWORD: $(LRE_PASSWORD)
              LRE_PROJECT:  $(LRE_PROJECT)

          # ── Poll for run completion ───────────────────────────────────────
          - task: PythonScript@0
            displayName: Wait for LRE run to complete
            inputs:
              scriptSource: inline
              script: |
                import requests, os, time, sys

                LRE_HOST     = os.environ["LRE_HOST"]
                LRE_USER     = os.environ["LRE_USER"]
                LRE_PASSWORD = os.environ["LRE_PASSWORD"]
                LRE_DOMAIN   = os.environ.get("LRE_DOMAIN", "DEFAULT")
                LRE_PROJECT  = os.environ["LRE_PROJECT"]
                RUN_ID       = os.environ["LRE_RUN_ID"]
                TIMEOUT_MIN  = int(os.environ.get("LRE_POLL_TIMEOUT_MINUTES", "120"))

                TERMINAL = {"Finished", "Failed", "Stopped", "Error"}
                deadline = time.time() + TIMEOUT_MIN * 60

                session = requests.Session()
                session.auth = (LRE_USER, LRE_PASSWORD)

                while time.time() < deadline:
                    resp = session.get(
                        f"{LRE_HOST}/LoadTest/rest/domains/{LRE_DOMAIN}"
                        f"/projects/{LRE_PROJECT}/Runs/{RUN_ID}",
                        verify=False,
                    )
                    if resp.status_code == 200:
                        state = resp.json().get("State", "")
                        print(f"  Run state: {state}")
                        if state in TERMINAL:
                            sys.exit(0 if state == "Finished" else 1)
                    else:
                        print(f"  Poll: {resp.status_code}")
                    time.sleep(30)

                print(f"Timeout after {TIMEOUT_MIN} minutes.")
                sys.exit(1)
            env:
              LRE_HOST:     $(LRE_HOST)
              LRE_USER:     $(LRE_USER)
              LRE_PASSWORD: $(LRE_PASSWORD)
              LRE_PROJECT:  $(LRE_PROJECT)
              LRE_RUN_ID:   $(TriggerLRE.LRE_RUN_ID)

          # ── Fetch ANALYZED RESULT zip and parse results DB ────────────────
          #
          # lre_fetch_and_parse.py:
          #   1. Polls /Runs/{ID}/Results until ANALYZED RESULT zip appears
          #   2. Downloads Results_<ID>.zip via REST API
          #   3. Extracts the SQLite .db (CE 2023+) or .mdb (older LRE)
          #   4. Queries Event_meter + Event_map for raw transaction samples
          #   5. Computes all percentiles in Python — no Analysis tool needed
          #   6. Writes lre_results.csv
          #
          # NOTE: Verify Event_meter contains per-sample data in your LRE
          # version before relying on this. See README.md for instructions.
          #
          - task: PythonScript@0
            name: FetchAndParse
            displayName: Fetch and parse LRE results DB
            inputs:
              scriptPath: lre_fetch_and_parse.py
              arguments: >
                --run-id   $(TriggerLRE.LRE_RUN_ID)
                --output   lre_results.csv
                --work-dir $(Agent.TempDirectory)/lre_work
            env:
              LRE_HOST:                  $(LRE_HOST)
              LRE_USER:                  $(LRE_USER)
              LRE_PASSWORD:              $(LRE_PASSWORD)
              LRE_DOMAIN:                $(LRE_DOMAIN)
              LRE_PROJECT:               $(LRE_PROJECT)
              LRE_RESULT_WAIT_SECONDS:   "300"
              LRE_RESULT_POLL_INTERVAL:  "20"
            continueOnError: false

          # ── Ingest into InfluxDB + Postgres ───────────────────────────────
          - task: PythonScript@0
            displayName: Ingest results
            inputs:
              scriptPath: perf_ingest.py
              arguments: >
                lre
                --csv-path      lre_results.csv
                --test-def-id   ${{ parameters.testDefId }}
                --lre-run-id    $(TriggerLRE.LRE_RUN_ID)
                --vusers        ${{ parameters.vusers }}
                --build-id      $(Build.BuildId)
                --pipeline-name "$(Build.DefinitionName)"
                --git-branch    $(Build.SourceBranchName)
                --git-commit    $(Build.SourceVersion)
                --triggered-by  ci
                ${{ if parameters.failOnSla }}--fail-on-sla${{ end }}
            env:
              INFLUX_URL:        $(INFLUX_URL)
              INFLUX_TOKEN:      $(INFLUX_TOKEN)
              INFLUX_ORG:        $(INFLUX_ORG)
              INFLUX_BUCKET:     $(INFLUX_BUCKET)
              POSTGRES_HOST:     $(POSTGRES_HOST)
              POSTGRES_USER:     $(POSTGRES_USER)
              POSTGRES_PASSWORD: $(POSTGRES_PASSWORD)
              POSTGRES_DB:       $(POSTGRES_DB)

          # ── Always publish artefacts ──────────────────────────────────────
          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: $(Agent.TempDirectory)/lre_work
              artifact:   lre-raw-results

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: lre_results.csv
              artifact:   lre-results-csv
