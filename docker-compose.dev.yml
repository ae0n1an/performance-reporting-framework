services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loadrunner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-loadrunner}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"   # expose to host so you can use psql / DBeaver
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loadrunner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: wsgi
      FLASK_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-loadrunner}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-loadrunner}
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
      DB_POOL_MIN: 1
      DB_POOL_MAX: 5
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app                   # mount source for hot reload
      - /app/__pycache__         # exclude pycache from mount

volumes:
  postgres_data_dev:
