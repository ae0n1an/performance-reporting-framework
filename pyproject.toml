[tool.mypy]
python_version = "3.12"
strict = true


[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes (undefined names, unused imports, etc.)
    "ANN",    # flake8-annotations — mandatory type hints on all functions
    "UP",     # pyupgrade — use modern Python syntax
    "I",      # isort — import ordering
    "PGH",    # pygrep-hooks — ban blanket `type: ignore` and `noqa` without a code
    "RUF100", # flag `# noqa` directives that suppress nothing (i.e. are unnecessary)
]


[tool.pytest.ini_options]
addopts = "--cov=app --cov-report=term-missing --cov-report=html --cov-fail-under=80"
pythonpath = ["."]

[tool.coverage.run]
branch = true
source = ["app"]
omit = ["app/db/migrate.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "if __name__ == .__main__.",
    "raise RuntimeError",
    "pragma: no cover",
]
